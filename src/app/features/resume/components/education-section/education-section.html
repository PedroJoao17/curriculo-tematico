<section class="section-shell">
  <div class="container">
    <span class="badge-soft">Formação</span>
    <h2 class="mt-3 mb-4">Base acadêmica e cursos</h2>

    <div class="row g-4">
      <div class="col-md-6 col-xl-4" *ngFor="let item of education">
        <article class="glass-card education-card">
          <h3>{{ item.title }}</h3>
          <p>{{ item.institution }}</p>
          <span>{{ item.status }}</span>
        </article>
      </div>
    </div>
  </div>
</section>
