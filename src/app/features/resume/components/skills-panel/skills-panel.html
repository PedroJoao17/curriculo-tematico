<section class="section-shell">
  <div class="container">
    <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
      <div>
        <span class="badge-soft">Arsenal técnico</span>
        <h2 class="mt-3">Competências organizadas por área</h2>
      </div>

      <div class="filter-row">
        <button
          type="button"
          class="filter-button"
          *ngFor="let filter of filters()"
          [class.active]="selectedGroup() === filter"
          (click)="selectGroup(filter)"
        >
          {{ filter }}
        </button>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-6 col-xl-4" *ngFor="let group of filteredGroups()">
        <article class="glass-card skill-card">
          <i class="bi" [class]="group.icon"></i>
          <h3>{{ group.title }}</h3>

          <div class="skill-list">
            <span *ngFor="let item of group.items">
              {{ item }}
            </span>
          </div>
        </article>
      </div>
    </div>
  </div>
</section>
