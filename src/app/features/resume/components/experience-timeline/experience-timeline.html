<section id="experiencia" class="section-shell">
  <div class="container">
    <div class="section-heading">
      <span class="badge-soft">Experiência</span>
      <h2 class="mt-3">Linha do tempo profissional</h2>
    </div>

    <div class="timeline">
      <article class="glass-card timeline-item" *ngFor="let experience of experiences">
        <div class="timeline-marker"></div>

        <div>
          <span class="period">{{ experience.period }}</span>
          <h3>{{ experience.role }}</h3>
          <strong>{{ experience.company }}</strong>

          <ul>
            <li *ngFor="let highlight of experience.highlights">
              {{ highlight }}
            </li>
          </ul>
        </div>
      </article>
    </div>
  </div>
</section>
